# Configuração de produção para TON-618 Cloud (SaaS)
# Uso: docker compose -f docker-compose.cloud.yml up -d

services:
  ton618:
    build:
      context: ./core
      dockerfile: Dockerfile
      args:
        # Build com suporte comercial (multi-tenant + licenciamento)
        BUILD_TAGS: "sqlite_fts5 commercial"
    ports:
      - "6180:6180"
    volumes:
      - ./data/tenants:/data/tenants  # Bancos dos tenants
      - ./data/docs:/docs
      - ./data/documents:/documents
      - ./data/license.pub:/app/license.pub:ro  # Chave pública
      - ./data/license.lic:/app/license.lic:ro  # Licença assinada
    environment:
      - TON_LICENSE_PUB_KEY=/app/license.pub
      - TON_LICENSE_FILE=/app/license.lic
      - TON_MULTI_TENANT=true
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    # Health check específico para cloud
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6180/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backup automático dos bancos SQLite (opcional)
  backup:
    image: alpine:latest
    profile: backup
    volumes:
      - ./data/tenants:/data/tenants:ro
      - ./backups:/backups
    entrypoint: |
      sh -c "
      apk add --no-cache sqlite &&
      while true; do
        for db in /data/tenants/*/ton618.db; do
          tenant=\$$(basename \$$(dirname \$$db))
          sqlite3 \$$db '.backup /backups/\$$tenant-\$$(date +%Y%m%d-%H%M%S).db'
        done
        sleep 86400  # 24h
      done
      "
