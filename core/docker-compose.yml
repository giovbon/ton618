services:
  ton618-pkm:
    image: giovbon/ton618plus:latest
    container_name: ton618
    restart: unless-stopped
    user: root
    ports:
      - "6180:6180"
    environment:
      - DOCS_DIR=/app/docs
      - DB_PATH=/app/data/ton618.db
      - STATE_DIR=/app/data
      - WEB_DIR=/app/web
      - PORT=6180
      - POLL_INTERVAL_SEC=30
      - AUTH_USER=admin
      - AUTH_PASS=ton618_secret
      - TZ=America/Sao_Paulo
    volumes:
      - ./docs:/app/docs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6180/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Limites conservadores para Raspberry Pi (ajuste conforme o modelo)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
