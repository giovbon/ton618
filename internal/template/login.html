<!doctype html>
<html lang="pt-BR" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login — TON-618</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                height: 100vh;
                width: 100vw;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #09090b;
                color: #f8fafc;
                font-family: "Inter", system-ui, sans-serif;
            }
            .card {
                width: 100%;
                max-width: 380px;
                padding: 2.5rem;
                background: rgba(30, 41, 59, 0.4);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 24px;
                animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .header {
                text-align: center;
                margin-bottom: 2rem;
            }
            .logo {
                width: 56px;
                height: 56px;
                margin-bottom: 1rem;
                animation: pulseGlow 3s infinite alternate;
            }
            @keyframes pulseGlow {
                from {
                    filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.3));
                }
                to {
                    filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.8));
                }
            }
            h1 {
                font-size: 1.8rem;
                font-weight: 800;
                letter-spacing: -0.025em;
                background: linear-gradient(to right, #60a5fa, #3b82f6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .sub {
                color: #94a3b8;
                font-size: 0.8rem;
                margin-top: 0.5rem;
            }
            .form {
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
            }
            .field {
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
            }
            label {
                font-size: 0.8rem;
                font-weight: 500;
                color: #cbd5e1;
                margin-left: 0.25rem;
            }
            input {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 12px;
                padding: 0.75rem 1rem;
                color: white;
                font-size: 0.95rem;
                transition: all 0.2s;
                outline: none;
            }
            input:focus {
                border-color: #3b82f6;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
                background: rgba(15, 23, 42, 0.8);
            }
            .error {
                color: #f87171;
                font-size: 0.8rem;
                text-align: center;
                background: rgba(248, 113, 113, 0.1);
                padding: 0.5rem;
                border-radius: 8px;
                display: none;
            }
            button {
                margin-top: 0.5rem;
                background: #3b82f6;
                color: white;
                border: none;
                border-radius: 12px;
                padding: 0.8rem;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }
            button:hover {
                background: #2563eb;
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            }
            button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }
            .footer {
                margin-top: 1.5rem;
                text-align: center;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                padding-top: 1.2rem;
            }
            .footer p {
                font-size: 0.7rem;
                color: #64748b;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="header">
                <svg
                    class="logo"
                    viewBox="0 0 100 100"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <defs>
                        <radialGradient id="g" cx="50%" cy="50%" r="50%">
                            <stop offset="65%" stop-color="#000000" />
                            <stop offset="100%" stop-color="#0f172a" />
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="white" opacity="0.2" />
                    <circle
                        cx="50"
                        cy="50"
                        r="28"
                        stroke="white"
                        stroke-width="1.2"
                        stroke-opacity="0.8"
                        fill="none"
                    />
                    <circle cx="50" cy="50" r="26" fill="url(#g)" />
                    <circle cx="50" cy="50" r="22" fill="#000" />
                    <path
                        d="M50 8 C75 8 92 22 92 50 C92 68 82 82 70 86 C80 72 80 52 75 42 C70 34 58 26 50 26Z"
                        fill="white"
                        opacity="0.7"
                    />
                    <path
                        d="M50 10 C72 10 88 25 88 50 C88 66 78 80 66 84 C76 70 76 54 72 44 C66 36 56 28 50 28Z"
                        fill="#e2e8f0"
                        opacity="0.3"
                        transform="rotate(120 50 50)"
                    />
                    <path
                        d="M50 10 C70 10 86 28 86 50 C86 66 78 80 66 84 C74 70 74 54 70 44 C66 36 56 28 50 28Z"
                        fill="white"
                        opacity="0.5"
                        transform="rotate(240 50 50)"
                    />
                </svg>
                <h1>TON-618</h1>
                <p class="sub">Buraco negro de conhecimento</p>
            </div>
            <form class="form" id="login-form">
                <div class="field">
                    <label for="user">Usuário</label>
                    <input
                        id="user"
                        type="text"
                        placeholder="Usuário"
                        required
                        autocomplete="username"
                    />
                </div>
                <div class="field">
                    <label for="pass">Senha</label>
                    <input
                        id="pass"
                        type="password"
                        placeholder="Senha"
                        required
                        autocomplete="current-password"
                    />
                </div>
                <div class="error" id="login-error"></div>
                <button type="submit" id="login-btn">Entrar</button>
            </form>
            <div class="footer"><p>Auto-hospedado &amp; Privado</p></div>
        </div>
        <script>
            // Flag para evitar condição de corrida entre validação automática e submit
            var _loginSubmitted = false;

            // Se já tem auth em sessionStorage, tenta validar
            (function () {
                var existing = sessionStorage.getItem("ton_auth");
                if (existing) {
                    fetch("/api/status", {
                        headers: { Authorization: existing },
                    })
                        .then(function (r) {
                            if (_loginSubmitted) return;
                            if (r.ok) {
                                // Reforça o cookie no formato correto (base64 bruto, sem prefixo)
                                var rawAuth = existing.replace("Basic ", "");
                                document.cookie =
                                    "ton_auth=" +
                                    rawAuth +
                                    ";path=/;SameSite=Lax;max-age=86400";
                                window.location.href = "/";
                            } else {
                                sessionStorage.removeItem("ton_auth");
                                document.cookie = "ton_auth=;path=/;max-age=0";
                            }
                        })
                        .catch(function () {
                            if (_loginSubmitted) return;
                            sessionStorage.removeItem("ton_auth");
                            document.cookie = "ton_auth=;path=/;max-age=0";
                        });
                }
            })();

            document
                .getElementById("login-form")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();
                    _loginSubmitted = true;
                    var user = document.getElementById("user").value;
                    var pass = document.getElementById("pass").value;
                    var btn = document.getElementById("login-btn");
                    var errEl = document.getElementById("login-error");
                    btn.disabled = true;
                    btn.textContent = "Verificando...";
                    errEl.style.display = "none";
                    var auth = btoa(user + ":" + pass);
                    var basicHeader = "Basic " + auth;
                    try {
                        // Usa /api/status (que requer auth) em vez de /api/health (público)
                        var resp = await fetch("/api/status", {
                            headers: { Authorization: basicHeader },
                        });
                        if (resp.ok) {
                            sessionStorage.setItem("ton_auth", basicHeader);
                            // Cookie apenas com base64 bruto (sem prefixo "Basic ")
                            // para evitar problemas com URL-encoding do espaço
                            document.cookie =
                                "ton_auth=" +
                                auth +
                                ";path=/;SameSite=Lax;max-age=86400";
                            window.location.href = "/";
                        } else if (resp.status === 401) {
                            errEl.textContent = "Usuário ou senha incorretos.";
                            errEl.style.display = "block";
                        } else {
                            errEl.textContent =
                                "Erro do servidor: " + resp.status;
                            errEl.style.display = "block";
                        }
                    } catch (e) {
                        errEl.textContent = "Erro ao conectar ao servidor.";
                        errEl.style.display = "block";
                    }
                    btn.disabled = false;
                    btn.textContent = "Entrar";
                });
        </script>
    </body>
</html>
