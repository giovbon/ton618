{{template "layout" .}} {{define "graphContent"}}
<style>
    .graph-page {
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
    }
    .graph-card {
        height: calc(100vh - 140px) !important;
        width: 100%;
    }
    canvas#graph-canvas {
        display: block;
    }
    .graph-tooltip {
        position: fixed;
        display: none;
        background: #18181b;
        border: 1px solid #3f3f46;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 11px;
        max-width: 320px;
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        line-height: 1.5;
    }
    .graph-tooltip .tt-title {
        font-weight: 700;
        font-size: 12px;
        color: #f4f4f5;
        margin-bottom: 4px;
    }
    .graph-tooltip .tt-meta {
        color: #a1a1aa;
        font-size: 10px;
        margin-top: 4px;
    }
    .graph-tooltip .tt-tag {
        display: inline-block;
        background: #27272a;
        color: #d4d4d8;
        padding: 1px 6px;
        border-radius: 3px;
        margin: 1px 2px;
        font-size: 10px;
    }
</style>
<div class="graph-page">
    <div class="flex items-center justify-between mb-2" style="padding: 0 4px">
        <h1 class="text-sm font-black tracking-tight text-zinc-200">
            Mapa Semântico
        </h1>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5">
                <input
                    id="semantic-search-input"
                    type="text"
                    placeholder="Pergunte algo..."
                    class="w-36 md:w-48 px-3 py-1.5 text-[11px] bg-zinc-900/60 border border-zinc-800 rounded-lg text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-sky-500/50 focus:w-56 transition-all"
                    spellcheck="false"
                />
                <button
                    id="semantic-search-btn"
                    class="text-[11px] font-bold text-sky-400 hover:text-sky-300 transition-colors"
                >
                    Buscar
                </button>
                <button
                    id="semantic-clear-btn"
                    class="hidden text-[13px] text-zinc-600 hover:text-zinc-400 transition-colors"
                    title="Limpar busca"
                >
                    ✕
                </button>
            </div>
            <span
                id="graph-status"
                class="text-[10px] text-zinc-600 font-medium"
                >—</span
            >
            <span class="text-[10px] text-zinc-700 hidden md:inline"
                >✦ embedadas</span
            >
        </div>
    </div>
    <div
        class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden premium-card graph-card"
    >
        <canvas id="graph-canvas" style="width: 100%; height: 100%"></canvas>
    </div>
    <p
        class="text-[10px] text-zinc-600 mt-2 text-center tracking-wide uppercase"
    >
        Use o scroll do mouse para dar zoom · Clique no nó para abrir
    </p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const statusEl = document.getElementById("graph-status");
        statusEl.textContent = "Carregando...";

        let data;
        try {
            const resp = await fetch("/api/graph/data");
            data = await resp.json();
        } catch (e) {
            statusEl.textContent = "Erro ao carregar";
            return;
        }

        var nodes = data.nodes || [];
        if (nodes.length === 0) {
            statusEl.textContent = "Nenhuma nota embedada";
            return;
        }

        var clusterCount = data.clusters || 0;

        var allZero = nodes.every(function (n) {
            return n.x === 0 && n.y === 0;
        });
        if (allZero) {
            var cols = Math.ceil(Math.sqrt(nodes.length));
            nodes.forEach(function (n, i) {
                n.x = (i % cols) * 120 + 60;
                n.y = Math.floor(i / cols) * 120 + 60;
            });
        }

        statusEl.textContent =
            nodes.length + " notas · " + clusterCount + " grupos";

        // ── Canvas ──
        var canvas = document.getElementById("graph-canvas");
        var ctx = canvas.getContext("2d");
        var dpr = window.devicePixelRatio || 1;

        function resizeCanvas() {
            var r = canvas.parentElement.getBoundingClientRect();
            canvas.width = r.width * dpr;
            canvas.height = r.height * dpr;
            canvas.style.width = r.width + "px";
            canvas.style.height = r.height + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return [r.width, r.height];
        }
        var dim = resizeCanvas();
        var W = dim[0],
            H = dim[1];

        window.addEventListener("resize", function () {
            dim = resizeCanvas();
            W = dim[0];
            H = dim[1];
            markHeatmapDirty();
            render();
        });

        // ── Tooltip ──
        var tooltip = document.createElement("div");
        tooltip.className = "graph-tooltip";
        document.body.appendChild(tooltip);

        // ── Heatmap de densidade (substitui o antigo Voronoi) ──
        // Cria um canvas offscreen para acumular densidade gaussiana.
        // Cada nota contribui com um gradiente radial; regiões com muitas notas
        // ficam mais brilhantes, revelando concentrações semânticas naturais.
        var heatmapCanvas = document.createElement("canvas");
        var heatCtx = heatmapCanvas.getContext("2d");
        var heatRadius = 60;
        var heatmapDirty = true;

        function buildHeatmap() {
            if (!heatmapDirty) return;
            heatmapDirty = false;

            var r = canvas.parentElement.getBoundingClientRect();
            heatmapCanvas.width = r.width;
            heatmapCanvas.height = r.height;
            heatCtx.clearRect(0, 0, r.width, r.height);

            // Acumula gradientes de cada nó no espaço de tela
            var pr = window.devicePixelRatio || 1;
            nodes.forEach(function (n) {
                var sx = n.x * scale + tx;
                var sy = n.y * scale + ty;
                if (
                    sx < -heatRadius ||
                    sx > r.width + heatRadius ||
                    sy < -heatRadius ||
                    sy > r.height + heatRadius
                ) {
                    return; // skip offscreen
                }
                var grad = heatCtx.createRadialGradient(
                    sx,
                    sy,
                    0,
                    sx,
                    sy,
                    heatRadius,
                );
                grad.addColorStop(0, "rgba(56,189,248,0.10)");
                grad.addColorStop(0.4, "rgba(56,189,248,0.04)");
                grad.addColorStop(1, "rgba(56,189,248,0)");
                heatCtx.fillStyle = grad;
                heatCtx.fillRect(
                    sx - heatRadius,
                    sy - heatRadius,
                    heatRadius * 2,
                    heatRadius * 2,
                );
            });
        }

        function markHeatmapDirty() {
            heatmapDirty = true;
        }

        // ── View state ──
        var tx = W / 2,
            ty = H / 2,
            scale = 1;
        var mnX = Infinity,
            mxX = -Infinity,
            mnY = Infinity,
            mxY = -Infinity;
        nodes.forEach(function (n) {
            if (n.x < mnX) mnX = n.x;
            if (n.x > mxX) mxX = n.x;
            if (n.y < mnY) mnY = n.y;
            if (n.y > mxY) mxY = n.y;
        });
        scale = Math.min(
            (W - 160) / (mxX - mnX || 1),
            (H - 160) / (mxY - mnY || 1),
        );
        if (scale > 2) scale = 2;
        tx = W / 2 - ((mnX + mxX) / 2) * scale;
        ty = H / 2 - ((mnY + mxY) / 2) * scale;

        // ── Render ──
        function render() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = "#09090b";
            ctx.fillRect(0, 0, W, H);
            ctx.save();
            // Heatmap de densidade — desenha ANTES do translate/scale,
            // pois buildHeatmap() já computa as coordenadas de tela manualmente
            buildHeatmap();
            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.drawImage(heatmapCanvas, 0, 0);
            ctx.restore();

            ctx.translate(tx, ty);
            ctx.scale(scale, scale);

            // Links
            var links = data.links || [];
            ctx.strokeStyle = "#27272a";
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 0.5 / scale;
            ctx.beginPath();
            links.forEach(function (l) {
                var sx = typeof l.source === "object" ? l.source.x : 0;
                var sy = typeof l.source === "object" ? l.source.y : 0;
                var tx2 = typeof l.target === "object" ? l.target.x : 0;
                var ty2 = typeof l.target === "object" ? l.target.y : 0;
                ctx.moveTo(sx, sy);
                ctx.lineTo(tx2, ty2);
            });
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Nodes
            var showLabels = scale >= 0.5;
            nodes.forEach(function (n) {
                var r = n.radius || 7,
                    px = n.x,
                    py = n.y;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fillStyle = n.color || "#38bdf8";
                ctx.globalAlpha = 0.9;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = "#18181b";
                ctx.lineWidth = 2 / scale;
                ctx.stroke();
                // Highlight glow for semantic search results
                if (n._highlighted) {
                    ctx.beginPath();
                    ctx.arc(px, py, r + 8, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(56,189,248,0.10)";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(px, py, r + 6, 0, Math.PI * 2);
                    ctx.strokeStyle = "#38bdf8";
                    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(Date.now() / 800);
                    ctx.lineWidth = 2 / scale;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
                ctx.fillStyle = "#f8fafc";
                ctx.font = 10 / scale + "px Inter,system-ui,sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                // Label: só aparece com zoom (scale >= 0.5), exceto notas destacadas pela busca
                if (showLabels || n._highlighted) {
                    ctx.fillStyle = n._highlighted ? "#38bdf8" : "#71717a";
                    ctx.font =
                        "500 " + 10 / scale + "px Inter,system-ui,sans-serif";
                    ctx.fillText(
                        n.title ||
                            n.id
                                .split("/")
                                .pop()
                                .replace(/\.(md|pdf)$/i, "") ||
                            "?",
                        px,
                        py + r + 14 / scale,
                    );
                }
            });

            // ── Query point (if set) ──
            if (queryPoint) {
                ctx.strokeStyle = "#38bdf8";
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 1 / scale;
                ctx.setLineDash([4 / scale, 4 / scale]);
                var qn = queryPoint.nearest || [];
                qn.forEach(function (nr) {
                    ctx.beginPath();
                    ctx.moveTo(queryPoint.x, queryPoint.y);
                    ctx.lineTo(nr.x, nr.y);
                    ctx.stroke();
                });
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
                var pulse = (Math.sin(Date.now() / 600) + 1) / 2;
                var qr = 8 + pulse * 5;
                ctx.beginPath();
                ctx.arc(queryPoint.x, queryPoint.y, qr + 3, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(56,189,248,0.15)";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(queryPoint.x, queryPoint.y, qr, 0, Math.PI * 2);
                ctx.fillStyle = "#38bdf8";
                ctx.globalAlpha = 0.85;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5 / scale;
                ctx.stroke();
                ctx.fillStyle = "#fff";
                ctx.font =
                    "bold " + 10 / scale + "px Inter,system-ui,sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("?", queryPoint.x, queryPoint.y);
                if (scale >= 0.5 && queryPoint.text) {
                    ctx.fillStyle = "#38bdf8";
                    ctx.font =
                        "500 " + 10 / scale + "px Inter,system-ui,sans-serif";
                    var label =
                        queryPoint.text.length > 30
                            ? queryPoint.text.slice(0, 30) + "..."
                            : queryPoint.text;
                    ctx.fillText(
                        label,
                        queryPoint.x,
                        queryPoint.y + qr + 14 / scale,
                    );
                }
            }
            ctx.restore();
        }

        // ── Hit test ──
        function hitNode(sx, sy) {
            var found = null,
                minD = 30;
            nodes.forEach(function (n) {
                var nx = n.x * scale + tx,
                    ny = n.y * scale + ty;
                var d = Math.sqrt(
                    (sx - nx) * (sx - nx) + (sy - ny) * (sy - ny),
                );
                if (d < minD) {
                    minD = d;
                    found = n;
                }
            });
            return found;
        }

        // ── Mouse ──
        var hover = null;
        canvas.addEventListener("mousemove", function (e) {
            var r = canvas.getBoundingClientRect();
            var n = hitNode(e.clientX - r.left, e.clientY - r.top);
            if (n !== hover) {
                canvas.style.cursor = n ? "pointer" : "default";
                hover = n;
            }
            if (n) {
                var tHtml = "";
                if (n.tags && n.tags.length > 0)
                    tHtml = n.tags
                        .map(function (t) {
                            return '<span class="tt-tag">#' + t + "</span>";
                        })
                        .join(" ");
                var im = { pdf: "📕", video: "🎬", article: "📝", note: "🗒️" };
                tooltip.style.display = "block";
                tooltip.innerHTML =
                    '<div class="tt-title">' +
                    (im[n.note_type] || "") +
                    " " +
                    (n.title || "?") +
                    "</div>" +
                    (tHtml
                        ? '<div style="margin-top:4px">' + tHtml + "</div>"
                        : "") +
                    '<div class="tt-meta">' +
                    (n.popularity ? "Acessos: " + n.popularity + " · " : "") +
                    "Cluster " +
                    (n.cluster_id || 0) +
                    "</div>";
                tooltip.style.left = e.pageX + 14 + "px";
                tooltip.style.top = e.pageY - 10 + "px";
            } else {
                tooltip.style.display = "none";
            }
        });
        canvas.addEventListener("mouseout", function () {
            tooltip.style.display = "none";
            hover = null;
            canvas.style.cursor = "default";
        });
        canvas.addEventListener("click", function (e) {
            var r = canvas.getBoundingClientRect();
            var n = hitNode(e.clientX - r.left, e.clientY - r.top);
            if (!n) return;
            if (n.id && n.id.indexOf("pdfs/") === 0)
                window.open("/file?name=" + encodeURIComponent(n.id), "_blank");
            else if (n.id && n.id.indexOf(".zip") > 0)
                window.open(
                    "/file/download?name=" + encodeURIComponent(n.id),
                    "_blank",
                );
            else
                window.location.href =
                    "/editor?file=" + encodeURIComponent(n.id);
        });

        // ── Wheel zoom ──
        canvas.addEventListener(
            "wheel",
            function (e) {
                e.preventDefault();
                var r = canvas.getBoundingClientRect();
                var mx = e.clientX - r.left,
                    my = e.clientY - r.top;
                var f = e.deltaY < 0 ? 1.1 : 0.9;
                var ns = scale * f;
                if (ns < 0.05 || ns > 20) return;
                tx = mx - (mx - tx) * f;
                ty = my - (my - ty) * f;
                scale = ns;
                markHeatmapDirty();
                render();
            },
            { passive: false },
        );

        // ── Pan ──
        var drag = false,
            dx,
            dy;
        canvas.addEventListener("mousedown", function (e) {
            drag = true;
            dx = e.clientX;
            dy = e.clientY;
            canvas.style.cursor = "grabbing";
        });
        window.addEventListener("mousemove", function (e) {
            if (!drag) return;
            tx += e.clientX - dx;
            ty += e.clientY - dy;
            dx = e.clientX;
            dy = e.clientY;
            markHeatmapDirty();
            render();
        });
        window.addEventListener("mouseup", function () {
            drag = false;
            canvas.style.cursor = hover ? "pointer" : "default";
        });

        // Touch
        var t0 = null;
        canvas.addEventListener("touchstart", function (e) {
            if (e.touches.length === 1) {
                drag = true;
                dx = e.touches[0].clientX;
                dy = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                drag = false;
                t0 = [
                    { x: e.touches[0].clientX, y: e.touches[0].clientY },
                    { x: e.touches[1].clientX, y: e.touches[1].clientY },
                ];
            }
        });
        canvas.addEventListener(
            "touchmove",
            function (e) {
                e.preventDefault();
                if (e.touches.length === 1 && drag) {
                    tx += e.touches[0].clientX - dx;
                    ty += e.touches[0].clientY - dy;
                    dx = e.touches[0].clientX;
                    dy = e.touches[0].clientY;
                    markHeatmapDirty();
                    render();
                } else if (e.touches.length === 2 && t0) {
                    var t1 = {
                            x: e.touches[0].clientX,
                            y: e.touches[0].clientY,
                        },
                        t2 = {
                            x: e.touches[1].clientX,
                            y: e.touches[1].clientY,
                        };
                    var d0 = Math.hypot(t0[0].x - t0[1].x, t0[0].y - t0[1].y),
                        d1 = Math.hypot(t1.x - t2.x, t1.y - t2.y);
                    var f = d1 / d0;
                    if (Math.abs(f - 1) > 0.01) {
                        var mx = (t1.x + t2.x) / 2,
                            my = (t1.y + t2.y) / 2,
                            r = canvas.getBoundingClientRect();
                        var sx = mx - r.left,
                            sy = my - r.top;
                        tx = sx - (sx - tx) * f;
                        ty = sy - (sy - ty) * f;
                        scale = Math.max(0.05, Math.min(20, scale * f));
                        markHeatmapDirty();
                        render();
                    }
                    t0 = [t1, t2];
                }
            },
            { passive: false },
        );
        canvas.addEventListener("touchend", function () {
            drag = false;
            t0 = null;
        });

        // ── Semantic search ──
        var queryPoint = null;
        var animationFrame = null;

        function clearSearch() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            document.getElementById("semantic-search-input").value = "";
            document
                .getElementById("semantic-clear-btn")
                .classList.add("hidden");
            queryPoint = null;
            nodes.forEach(function (n) {
                n._highlighted = false;
            });
            render();
        }

        document
            .getElementById("semantic-clear-btn")
            .addEventListener("click", clearSearch);

        document
            .getElementById("semantic-search-btn")
            .addEventListener("click", doSemanticSearch);
        document
            .getElementById("semantic-search-input")
            .addEventListener("keydown", function (e) {
                if (e.key === "Enter") doSemanticSearch();
            });

        async function doSemanticSearch() {
            var input = document.getElementById("semantic-search-input");
            var q = input.value.trim();
            if (!q) return;
            var btn = document.getElementById("semantic-search-btn");
            var origText = btn.textContent;
            btn.textContent = "...";
            btn.style.pointerEvents = "none";
            try {
                var resp = await fetch("/api/graph/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: q }),
                });
                if (!resp.ok) {
                    var err = await resp.text();
                    throw new Error(err);
                }
                var data = await resp.json();
                data.nearest = (data.nearest || []).filter(function (nr) {
                    var found = nodes.find(function (gn) {
                        return gn.id === nr.arquivo;
                    });
                    if (found) {
                        nr.x = found.x;
                        nr.y = found.y;
                        return true;
                    }
                    return false;
                });
                // Posiciona o ponto da busca no centroide ponderado dos resultados
                var best = data.nearest[0];
                var qpx = data.query_x || 0;
                var qpy = data.query_y || 0;
                // Se ha poucos resultados, desloca um pouco do melhor pra ficar visivel
                if (best && data.nearest.length < 4) {
                    var dx = qpx - best.x;
                    var dy = qpy - best.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 20) {
                        qpx = best.x + 30;
                        qpy = best.y - 30;
                    }
                }
                queryPoint = {
                    x: qpx,
                    y: qpy,
                    text: data.query_text || q,
                    nearest: data.nearest,
                };
                nodes.forEach(function (n) {
                    n._highlighted = data.nearest.some(function (nr) {
                        return nr.arquivo === n.id;
                    });
                });
                if (animationFrame) cancelAnimationFrame(animationFrame);
                function animatePulse() {
                    render();
                    animationFrame = requestAnimationFrame(animatePulse);
                }
                animatePulse();
                document
                    .getElementById("semantic-clear-btn")
                    .classList.remove("hidden");
            } catch (err) {
                alert("Erro na busca: " + err.message);
            } finally {
                btn.textContent = origText;
                btn.style.pointerEvents = "";
            }
        }

        render();
    });
</script>
{{end}}
