{{template "layout" .}} {{define "graphContent"}}
<style>
    .graph-page {
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
    }
    .graph-card {
        height: calc(100vh - 140px) !important;
        width: 100%;
    }
    canvas#graph-canvas {
        display: block;
    }
    .graph-tooltip {
        position: fixed;
        display: none;
        background: #18181b;
        border: 1px solid #3f3f46;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 11px;
        max-width: 320px;
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        line-height: 1.5;
    }
    .graph-tooltip .tt-title {
        font-weight: 700;
        font-size: 12px;
        color: #f4f4f5;
        margin-bottom: 4px;
    }
    .graph-tooltip .tt-meta {
        color: #a1a1aa;
        font-size: 10px;
        margin-top: 4px;
    }
    .graph-tooltip .tt-tag {
        display: inline-block;
        background: #27272a;
        color: #d4d4d8;
        padding: 1px 6px;
        border-radius: 3px;
        margin: 1px 2px;
        font-size: 10px;
    }
</style>
<div class="graph-page">
    <div class="flex items-center justify-between mb-2" style="padding: 0 4px">
        <h1 class="text-sm font-black tracking-tight text-zinc-200">
            Mapa Semântico
        </h1>
        <div class="flex items-center gap-4">
            <span
                id="graph-status"
                class="text-[10px] text-zinc-600 font-medium"
                >—</span
            >
            <span class="text-[10px] text-zinc-700">✦ notas embedadas</span>
        </div>
    </div>
    <div
        class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden premium-card graph-card"
    >
        <canvas id="graph-canvas" style="width: 100%; height: 100%"></canvas>
    </div>
    <p
        class="text-[10px] text-zinc-600 mt-2 text-center tracking-wide uppercase"
    >
        Use o scroll do mouse para dar zoom · Clique no nó para abrir
    </p>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const statusEl = document.getElementById("graph-status");
        statusEl.textContent = "Carregando...";

        let data;
        try {
            const resp = await fetch("/api/graph/data");
            data = await resp.json();
        } catch (e) {
            statusEl.textContent = "Erro ao carregar";
            return;
        }

        var nodes = data.nodes || [];
        if (nodes.length === 0) {
            statusEl.textContent = "Nenhuma nota embedada";
            return;
        }

        var clusterCount = data.clusters || 0;

        var allZero = nodes.every(function (n) {
            return n.x === 0 && n.y === 0;
        });
        if (allZero) {
            var cols = Math.ceil(Math.sqrt(nodes.length));
            nodes.forEach(function (n, i) {
                n.x = (i % cols) * 120 + 60;
                n.y = Math.floor(i / cols) * 120 + 60;
            });
        }

        statusEl.textContent =
            nodes.length + " notas · " + clusterCount + " grupos";

        // ── Canvas ──
        var canvas = document.getElementById("graph-canvas");
        var ctx = canvas.getContext("2d");
        var dpr = window.devicePixelRatio || 1;

        function resizeCanvas() {
            var r = canvas.parentElement.getBoundingClientRect();
            canvas.width = r.width * dpr;
            canvas.height = r.height * dpr;
            canvas.style.width = r.width + "px";
            canvas.style.height = r.height + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return [r.width, r.height];
        }
        var dim = resizeCanvas();
        var W = dim[0],
            H = dim[1];

        window.addEventListener("resize", function () {
            dim = resizeCanvas();
            W = dim[0];
            H = dim[1];
            render();
        });

        // ── Tooltip ──
        var tooltip = document.createElement("div");
        tooltip.className = "graph-tooltip";
        document.body.appendChild(tooltip);

        // ── Voronoi precompute ──
        var clusters = {};
        nodes.forEach(function (n) {
            var cid = n.cluster_id || 0;
            if (!clusters[cid]) clusters[cid] = { x: 0, y: 0, count: 0 };
            clusters[cid].x += n.x;
            clusters[cid].y += n.y;
            clusters[cid].count++;
        });
        var cIds = Object.keys(clusters).map(Number).sort();
        cIds.forEach(function (cid) {
            var c = clusters[cid];
            c.x /= c.count;
            c.y /= c.count;
        });
        var centroids = cIds.map(function (cid) {
            return [clusters[cid].x, clusters[cid].y];
        });
        var CLUSTER_COLORS = [
            "#38bdf8",
            "#10b981",
            "#f59e0b",
            "#ef4444",
            "#8b5cf6",
            "#ec4899",
            "#14b8a6",
            "#6366f1",
        ];

        var voronoiPaths = [];
        try {
            if (centroids.length >= 3) {
                var delaunay = d3.Delaunay.from(centroids);
                var voronoi = delaunay.voronoi([-10000, -10000, 10000, 10000]);
                cIds.forEach(function (cid, i) {
                    try {
                        voronoiPaths.push({
                            cid: cid,
                            path: new Path2D(voronoi.renderCell(i)),
                        });
                    } catch (e) {}
                });
            } else if (centroids.length === 2) {
                var x1 = centroids[0][0],
                    y1 = centroids[0][1],
                    x2 = centroids[1][0],
                    y2 = centroids[1][1];
                var midX = (x1 + x2) / 2,
                    midY = (y1 + y2) / 2,
                    dx = x2 - x1,
                    dy = y2 - y1;
                var len = Math.sqrt(dx * dx + dy * dy) || 1;
                var nx = (-dy / len) * 10000,
                    ny = (dx / len) * 10000;
                cIds.forEach(function (cid, i) {
                    var cx = clusters[cid].x,
                        cy = clusters[cid].y;
                    var side = (cx - midX) * nx + (cy - midY) * ny > 0 ? 1 : -1;
                    var pts = [
                        [-10000, -10000],
                        [10000, -10000],
                        [10000, 10000],
                        [-10000, 10000],
                    ];
                    var along = 20000;
                    pts.push(
                        [midX + nx * along, midY + ny * along],
                        [midX - nx * along, midY - ny * along],
                    );
                    var f = pts.filter(function (p) {
                        return (
                            ((p[0] - midX) * nx + (p[1] - midY) * ny) * side >
                            -1
                        );
                    });
                    f.sort(function (a, b) {
                        return (
                            Math.atan2(a[1] - cy, a[0] - cx) -
                            Math.atan2(b[1] - cy, b[0] - cx)
                        );
                    });
                    var p2 = new Path2D();
                    p2.moveTo(f[0][0], f[0][1]);
                    for (var k = 1; k < f.length; k++)
                        p2.lineTo(f[k][0], f[k][1]);
                    p2.closePath();
                    voronoiPaths.push({ cid: cid, path: p2 });
                });
            }
        } catch (e) {
            console.warn("Voronoi:" + e.message);
        }

        // ── View state ──
        var tx = W / 2,
            ty = H / 2,
            scale = 1;
        var mnX = Infinity,
            mxX = -Infinity,
            mnY = Infinity,
            mxY = -Infinity;
        nodes.forEach(function (n) {
            if (n.x < mnX) mnX = n.x;
            if (n.x > mxX) mxX = n.x;
            if (n.y < mnY) mnY = n.y;
            if (n.y > mxY) mxY = n.y;
        });
        scale = Math.min(
            (W - 160) / (mxX - mnX || 1),
            (H - 160) / (mxY - mnY || 1),
        );
        if (scale > 2) scale = 2;
        tx = W / 2 - ((mnX + mxX) / 2) * scale;
        ty = H / 2 - ((mnY + mxY) / 2) * scale;

        // ── Render ──
        function render() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = "#09090b";
            ctx.fillRect(0, 0, W, H);
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);

            // Voronoi
            var ccCache = {};
            voronoiPaths.forEach(function (vp) {
                var col =
                    ccCache[vp.cid] ||
                    (ccCache[vp.cid] =
                        CLUSTER_COLORS[vp.cid % CLUSTER_COLORS.length]);
                ctx.fillStyle = col;
                ctx.globalAlpha = 0.08;
                ctx.fill(vp.path);
                ctx.globalAlpha = 1;
                ctx.strokeStyle = col;
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 1.5 / scale;
                ctx.stroke(vp.path);
                ctx.globalAlpha = 1;
            });

            // Links
            var links = data.links || [];
            ctx.strokeStyle = "#27272a";
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 0.5 / scale;
            ctx.beginPath();
            links.forEach(function (l) {
                var sx = typeof l.source === "object" ? l.source.x : 0;
                var sy = typeof l.source === "object" ? l.source.y : 0;
                var tx2 = typeof l.target === "object" ? l.target.x : 0;
                var ty2 = typeof l.target === "object" ? l.target.y : 0;
                ctx.moveTo(sx, sy);
                ctx.lineTo(tx2, ty2);
            });
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Nodes
            var ICONS = {
                pdf: "📕",
                video: "🎬",
                article: "📝",
                note: "🗒️",
                imagem: "🖼️",
            };
            var showLabels = scale >= 0.5; // só mostra labels com zoom próximo
            nodes.forEach(function (n) {
                var r = n.radius || 7,
                    px = n.x,
                    py = n.y;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fillStyle = n.color || "#38bdf8";
                ctx.globalAlpha = 0.9;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = "#18181b";
                ctx.lineWidth = 2 / scale;
                ctx.stroke();
                ctx.fillStyle = "#f8fafc";
                ctx.font = 10 / scale + "px Inter,system-ui,sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(ICONS[n.note_type] || "🗒️", px, py);

                // Label: só aparece com zoom (scale >= 0.5)
                if (showLabels) {
                    ctx.fillStyle = "#71717a";
                    ctx.font =
                        "500 " + 10 / scale + "px Inter,system-ui,sans-serif";
                    ctx.fillText(
                        n.title ||
                            n.id
                                .split("/")
                                .pop()
                                .replace(/\.(md|pdf)$/i, "") ||
                            "?",
                        px,
                        py + r + 14 / scale,
                    );
                }
            });
            ctx.restore();
        }

        // ── Hit test ──
        function hitNode(sx, sy) {
            var found = null,
                minD = 30;
            nodes.forEach(function (n) {
                var nx = n.x * scale + tx,
                    ny = n.y * scale + ty;
                var d = Math.sqrt(
                    (sx - nx) * (sx - nx) + (sy - ny) * (sy - ny),
                );
                if (d < minD) {
                    minD = d;
                    found = n;
                }
            });
            return found;
        }

        // ── Mouse ──
        var hover = null;
        canvas.addEventListener("mousemove", function (e) {
            var r = canvas.getBoundingClientRect();
            var n = hitNode(e.clientX - r.left, e.clientY - r.top);
            if (n !== hover) {
                canvas.style.cursor = n ? "pointer" : "default";
                hover = n;
            }
            if (n) {
                var tHtml = "";
                if (n.tags && n.tags.length > 0)
                    tHtml = n.tags
                        .map(function (t) {
                            return '<span class="tt-tag">#' + t + "</span>";
                        })
                        .join(" ");
                var im = { pdf: "📕", video: "🎬", article: "📝", note: "🗒️" };
                tooltip.style.display = "block";
                tooltip.innerHTML =
                    '<div class="tt-title">' +
                    (im[n.note_type] || "") +
                    " " +
                    (n.title || "?") +
                    "</div>" +
                    (tHtml
                        ? '<div style="margin-top:4px">' + tHtml + "</div>"
                        : "") +
                    '<div class="tt-meta">' +
                    (n.popularity ? "Acessos: " + n.popularity + " · " : "") +
                    "Cluster " +
                    (n.cluster_id || 0) +
                    "</div>";
                tooltip.style.left = e.pageX + 14 + "px";
                tooltip.style.top = e.pageY - 10 + "px";
            } else {
                tooltip.style.display = "none";
            }
        });
        canvas.addEventListener("mouseout", function () {
            tooltip.style.display = "none";
            hover = null;
            canvas.style.cursor = "default";
        });
        canvas.addEventListener("click", function (e) {
            var r = canvas.getBoundingClientRect();
            var n = hitNode(e.clientX - r.left, e.clientY - r.top);
            if (!n) return;
            if (n.id && n.id.indexOf("pdfs/") === 0)
                window.open("/file?name=" + encodeURIComponent(n.id), "_blank");
            else
                window.location.href =
                    "/editor?file=" + encodeURIComponent(n.id);
        });

        // ── Wheel zoom ──
        canvas.addEventListener(
            "wheel",
            function (e) {
                e.preventDefault();
                var r = canvas.getBoundingClientRect();
                var mx = e.clientX - r.left,
                    my = e.clientY - r.top;
                var f = e.deltaY < 0 ? 1.1 : 0.9;
                var ns = scale * f;
                if (ns < 0.05 || ns > 20) return;
                tx = mx - (mx - tx) * f;
                ty = my - (my - ty) * f;
                scale = ns;
                render();
            },
            { passive: false },
        );

        // ── Pan ──
        var drag = false,
            dx,
            dy;
        canvas.addEventListener("mousedown", function (e) {
            drag = true;
            dx = e.clientX;
            dy = e.clientY;
            canvas.style.cursor = "grabbing";
        });
        window.addEventListener("mousemove", function (e) {
            if (!drag) return;
            tx += e.clientX - dx;
            ty += e.clientY - dy;
            dx = e.clientX;
            dy = e.clientY;
            render();
        });
        window.addEventListener("mouseup", function () {
            drag = false;
            canvas.style.cursor = hover ? "pointer" : "default";
        });

        // Touch
        var t0 = null;
        canvas.addEventListener("touchstart", function (e) {
            if (e.touches.length === 1) {
                drag = true;
                dx = e.touches[0].clientX;
                dy = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                drag = false;
                t0 = [
                    { x: e.touches[0].clientX, y: e.touches[0].clientY },
                    { x: e.touches[1].clientX, y: e.touches[1].clientY },
                ];
            }
        });
        canvas.addEventListener(
            "touchmove",
            function (e) {
                e.preventDefault();
                if (e.touches.length === 1 && drag) {
                    tx += e.touches[0].clientX - dx;
                    ty += e.touches[0].clientY - dy;
                    dx = e.touches[0].clientX;
                    dy = e.touches[0].clientY;
                    render();
                } else if (e.touches.length === 2 && t0) {
                    var t1 = {
                            x: e.touches[0].clientX,
                            y: e.touches[0].clientY,
                        },
                        t2 = {
                            x: e.touches[1].clientX,
                            y: e.touches[1].clientY,
                        };
                    var d0 = Math.hypot(t0[0].x - t0[1].x, t0[0].y - t0[1].y),
                        d1 = Math.hypot(t1.x - t2.x, t1.y - t2.y);
                    var f = d1 / d0;
                    if (Math.abs(f - 1) > 0.01) {
                        var mx = (t1.x + t2.x) / 2,
                            my = (t1.y + t2.y) / 2,
                            r = canvas.getBoundingClientRect();
                        var sx = mx - r.left,
                            sy = my - r.top;
                        tx = sx - (sx - tx) * f;
                        ty = sy - (sy - ty) * f;
                        scale = Math.max(0.05, Math.min(20, scale * f));
                        render();
                    }
                    t0 = [t1, t2];
                }
            },
            { passive: false },
        );
        canvas.addEventListener("touchend", function () {
            drag = false;
            t0 = null;
        });

        render();
    });
</script>
{{end}}
