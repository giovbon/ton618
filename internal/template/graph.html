{{template "layout" .}} {{define "graphContent"}}
<style>
    .graph-page {
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
    }
    .graph-card {
        height: calc(100vh - 140px) !important;
        width: 100%;
    }
    .graph-note {
        cursor: pointer;
    }
    .graph-note:hover circle {
        stroke: #fff !important;
        stroke-width: 3px !important;
    }
    .graph-note:hover text {
        fill: #e4e4e7 !important;
        font-weight: 700 !important;
    }
</style>
<div class="graph-page">
    <div class="flex items-center justify-between mb-2" style="padding: 0 4px">
        <h1 class="text-sm font-black tracking-tight text-zinc-200">
            Mapa Semântico
        </h1>
        <div class="flex items-center gap-4">
            <span
                id="graph-status"
                class="text-[10px] text-zinc-600 font-medium"
                >—</span
            >
            <span class="text-[10px] text-zinc-700">✦ notas embedadas</span>
        </div>
    </div>

    <div
        class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden premium-card graph-card"
    >
        <div
            id="graph-container"
            style="width: 100%; height: 100%; position: relative"
        ></div>
    </div>

    <p
        class="text-[10px] text-zinc-600 mt-2 text-center tracking-wide uppercase"
    >
        Scroll para zoom &middot; Clique na bolinha para abrir
    </p>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const statusEl = document.getElementById("graph-status");
        statusEl.textContent = "Carregando...";

        let data;
        try {
            const resp = await fetch("/api/graph/data");
            data = await resp.json();
        } catch (e) {
            statusEl.textContent = "Erro ao carregar";
            return;
        }

        var nodes = data.nodes || [];
        if (nodes.length === 0) {
            statusEl.textContent = "Nenhuma nota embedada";
            return;
        }

        var clusterCount = data.clusters || 0;

        // Grid fallback se todas as coordenadas forem (0,0)
        var allZero = nodes.every(function (n) {
            return n.x === 0 && n.y === 0;
        });
        if (allZero) {
            var cols = Math.ceil(Math.sqrt(nodes.length));
            nodes.forEach(function (n, i) {
                n.x = (i % cols) * 120 + 60;
                n.y = Math.floor(i / cols) * 120 + 60;
            });
        }

        var CLUSTER_COLORS = [
            "#38bdf8",
            "#10b981",
            "#f59e0b",
            "#ef4444",
            "#8b5cf6",
            "#ec4899",
            "#14b8a6",
            "#6366f1",
        ];

        var container = document.getElementById("graph-container");
        var width = container.clientWidth;
        var height = container.clientHeight;

        // SVG
        var svg = d3
            .select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("background", "#09090b")
            .style("overflow", "hidden");

        var g = svg.append("g");

        statusEl.textContent =
            nodes.length + " notas · " + clusterCount + " grupos";

        // ── Voronoi por cluster (um poligono por grupo, nao por nota) ──
        // Calcula o centroide de cada cluster e faz o Voronoi sobre eles.
        var voronoiGroup = g.append("g").attr("class", "voronoi");

        // 1. Agrupa notas por cluster_id e calcula centroides
        var clusters = {};
        nodes.forEach(function (n) {
            var cid = n.cluster_id || 0;
            if (!clusters[cid])
                clusters[cid] = { x: 0, y: 0, count: 0, color: null };
            clusters[cid].x += n.x;
            clusters[cid].y += n.y;
            clusters[cid].count++;
            clusters[cid].color =
                CLUSTER_COLORS[cid % CLUSTER_COLORS.length] || "#0ea5e9";
        });
        Object.keys(clusters).forEach(function (cid) {
            clusters[cid].x /= clusters[cid].count;
            clusters[cid].y /= clusters[cid].count;
        });

        // 2. Converte para arrays para o Delaunay
        var cIds = Object.keys(clusters).map(Number).sort();
        var centroids = cIds.map(function (cid) {
            return [clusters[cid].x, clusters[cid].y];
        });

        // 3. Voronoi dos centroides
        if (centroids.length >= 3) {
            var delaunay = d3.Delaunay.from(centroids);
            var voronoi = delaunay.voronoi([-10000, -10000, 10000, 10000]);

            voronoiGroup
                .selectAll("path")
                .data(cIds)
                .join("path")
                .attr("d", function (cid, i) {
                    try {
                        return voronoi.renderCell(i);
                    } catch (e) {
                        return null;
                    }
                })
                .attr("fill", function (cid) {
                    return clusters[cid].color;
                })
                .attr("fill-opacity", 0.08)
                .attr("stroke", function (cid) {
                    return clusters[cid].color;
                })
                .attr("stroke-opacity", 0.25)
                .attr("stroke-width", 1.5);
        } else if (centroids.length === 2) {
            // 2 clusters: divisao simples pelo ponto medio
            var x1 = centroids[0][0],
                y1 = centroids[0][1];
            var x2 = centroids[1][0],
                y2 = centroids[1][1];
            var midX = (x1 + x2) / 2,
                midY = (y1 + y2) / 2;
            // Perpendicular a reta que conecta os dois centroides
            var dx = x2 - x1,
                dy = y2 - y1;
            // Normal perpendicular
            var len = Math.sqrt(dx * dx + dy * dy) || 1;
            var nx = (-dy / len) * 10000;
            var ny = (dx / len) * 10000;
            // Dois poligonos: um de cada lado da linha divisoria
            var p1 = [
                [-10000, -10000],
                [10000, -10000],
                [10000, 10000],
                [-10000, 10000],
            ];
            var clipA = null,
                clipB = null;

            voronoiGroup
                .selectAll("path")
                .data(cIds)
                .join("path")
                .attr("d", function (cid, i) {
                    // Poligono infinito cortado pela mediatriz
                    var cx = clusters[cid].x,
                        cy = clusters[cid].y;
                    // Define se este lado esta "para cima" ou "para baixo" da mediatriz
                    var side = (cx - midX) * nx + (cy - midY) * ny > 0 ? 1 : -1;

                    // Constroi poligono: bounding box + linha de corte
                    var pts = [
                        [-10000, -10000],
                        [10000, -10000],
                        [10000, 10000],
                        [-10000, 10000],
                    ];
                    // Adiciona pontos da mediatriz
                    var along = 20000;
                    pts.push([midX + nx * along, midY + ny * along]);
                    pts.push([midX - nx * along, midY - ny * along]);

                    // Filtra pontos do lado correto
                    var filtered = pts.filter(function (p) {
                        return (
                            ((p[0] - midX) * nx + (p[1] - midY) * ny) * side >
                            -1
                        );
                    });

                    // Ordena por angulo em torno do centroide
                    filtered.sort(function (a, b) {
                        var angA = Math.atan2(a[1] - cy, a[0] - cx);
                        var angB = Math.atan2(b[1] - cy, b[0] - cx);
                        return angA - angB;
                    });

                    return (
                        "M" +
                        filtered
                            .map(function (p) {
                                return p[0] + "," + p[1];
                            })
                            .join("L") +
                        "Z"
                    );
                })
                .attr("fill", function (cid) {
                    return clusters[cid].color;
                })
                .attr("fill-opacity", 0.08)
                .attr("stroke", function (cid) {
                    return clusters[cid].color;
                })
                .attr("stroke-opacity", 0.25)
                .attr("stroke-width", 1.5);
        }

        // ── Links ──
        g.append("g")
            .selectAll("line")
            .data(data.links || [])
            .join("line")
            .attr("x1", function (d) {
                return typeof d.source === "object" ? d.source.x : 0;
            })
            .attr("y1", function (d) {
                return typeof d.source === "object" ? d.source.y : 0;
            })
            .attr("x2", function (d) {
                return typeof d.target === "object" ? d.target.x : 0;
            })
            .attr("y2", function (d) {
                return typeof d.target === "object" ? d.target.y : 0;
            })
            .attr("stroke", "#27272a")
            .attr("stroke-width", 0.5)
            .attr("stroke-opacity", 0.3);

        // ── Nodes ──
        var node = g
            .append("g")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .attr("class", "graph-note")
            .attr("transform", function (d) {
                return "translate(" + d.x + "," + d.y + ")";
            })
            .on("click", function (event, d) {
                event.stopPropagation();
                var isPdf = d.id && d.id.indexOf("pdfs/") === 0;
                if (isPdf) {
                    window.open(
                        "/file?name=" + encodeURIComponent(d.id),
                        "_blank",
                    );
                } else {
                    window.location.href =
                        "/editor?file=" + encodeURIComponent(d.id);
                }
            });

        // All nodes: render a colored circle (PDFs get a 📕 prefix in the text label)
        node.append("circle")
            .attr("r", 5)
            .attr("fill", function (d) {
                return (
                    CLUSTER_COLORS[
                        (d.cluster_id || 0) % CLUSTER_COLORS.length
                    ] || "#0ea5e9"
                );
            })
            .attr("opacity", 0.9)
            .attr("stroke", "#18181b")
            .attr("stroke-width", 2);

        node.append("text")
            .text(function (d) {
                var isPdf = d.id && d.id.indexOf("pdfs/") === 0;
                var label =
                    d.title ||
                    d.id
                        .split("/")
                        .pop()
                        .replace(/\.(md|pdf)$/i, "") ||
                    "?";
                return isPdf ? "\uD83D\uDCD5 " + label : label;
            })
            .attr("text-anchor", "middle")
            .attr("dy", 15)
            .attr("font-size", "10px")
            .attr("font-weight", "500")
            .attr("fill", function (d) {
                return d.id && d.id.indexOf("pdfs/") === 0
                    ? "#fb923c"
                    : "#71717a";
            })
            .attr("font-family", "Inter, system-ui, sans-serif")
            .attr("pointer-events", "none");

        // ── Zoom simples (sem recalcular Voronoi) ──
        var zoom = d3
            .zoom()
            .scaleExtent([0.05, 20])
            .on("zoom", function (event) {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // ── Zoom inicial ──
        var mnX = Infinity,
            mxX = -Infinity,
            mnY = Infinity,
            mxY = -Infinity;
        nodes.forEach(function (n) {
            if (n.x < mnX) mnX = n.x;
            if (n.x > mxX) mxX = n.x;
            if (n.y < mnY) mnY = n.y;
            if (n.y > mxY) mxY = n.y;
        });

        var sc = Math.min(
            (width - 160) / (mxX - mnX || 1),
            (height - 160) / (mxY - mnY || 1),
        );

        svg.call(
            zoom.transform,
            d3.zoomIdentity
                .translate(width / 2, height / 2)
                .scale(sc)
                .translate(-(mnX + mxX) / 2, -(mnY + mxY) / 2),
        );
    });
</script>
{{end}}
