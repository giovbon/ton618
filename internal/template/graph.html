{{template "layout" .}} {{define "graphContent"}}
<style>
    .graph-page {
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
    }
    .graph-card {
        height: calc(100vh - 140px) !important;
        width: 100%;
    }
    .graph-note:hover circle {
        stroke: #fff !important;
        stroke-width: 3px !important;
    }
    .graph-note:hover text {
        fill: #e4e4e7 !important;
        font-weight: 700 !important;
    }
</style>
<div class="graph-page">
    <div class="flex items-center justify-between mb-2" style="padding: 0 4px">
        <h1 class="text-sm font-black tracking-tight text-zinc-200">
            Mapa Semântico
        </h1>
        <div class="flex items-center gap-4">
            <span
                id="graph-status"
                class="text-[10px] text-zinc-600 font-medium"
                >—</span
            >
            <span class="text-[10px] text-zinc-700">✦ notas embedadas</span>
        </div>
    </div>

    <div
        class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden premium-card graph-card"
    >
        <div
            id="graph-container"
            style="width: 100%; height: 100%; position: relative"
        ></div>
    </div>

    <p
        class="text-[10px] text-zinc-600 mt-2 text-center tracking-wide uppercase"
    >
        Scroll para zoom &middot; Clique na bolinha para abrir
    </p>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const statusEl = document.getElementById("graph-status");
        statusEl.textContent = "Carregando...";

        let data;
        try {
            const resp = await fetch("/api/graph/data");
            data = await resp.json();
        } catch (e) {
            statusEl.textContent = "Erro ao carregar";
            return;
        }

        var nodes = data.nodes || [];
        if (nodes.length === 0) {
            statusEl.textContent = "Nenhuma nota embedada";
            return;
        }

        var clusterCount = data.clusters || 0;

        // Se todas as coordenadas forem (0,0), espalha os nos num grid
        var allZero = nodes.every(function (n) {
            return n.x === 0 && n.y === 0;
        });
        if (allZero) {
            var cols = Math.ceil(Math.sqrt(nodes.length));
            nodes.forEach(function (n, i) {
                n.x = (i % cols) * 120 + 60;
                n.y = Math.floor(i / cols) * 120 + 60;
            });
        }

        var CLUSTER_COLORS = [
            "#38bdf8",
            "#10b981",
            "#f59e0b",
            "#ef4444",
            "#8b5cf6",
            "#ec4899",
            "#14b8a6",
            "#6366f1",
        ];

        var container = document.getElementById("graph-container");
        var width = container.clientWidth;
        var height = container.clientHeight;

        // SVG + zoom
        var svg = d3
            .select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("background", "#09090b")
            .style("overflow", "hidden");

        var g = svg.append("g");

        statusEl.textContent =
            nodes.length + " notas · " + clusterCount + " grupos";

        // ── Voronoi: recalcula no zoom para cobrir area visivel ──
        var voronoiGroup = g.append("g").attr("class", "voronoi");

        function renderVoronoi(bounds) {
            if (!bounds) {
                var minX = Infinity,
                    maxX = -Infinity,
                    minY = Infinity,
                    maxY = -Infinity;
                nodes.forEach(function (n) {
                    if (n.x < minX) minX = n.x;
                    if (n.x > maxX) maxX = n.x;
                    if (n.y < minY) minY = n.y;
                    if (n.y > maxY) maxY = n.y;
                });
                var dx = maxX - minX || 1,
                    dy = maxY - minY || 1;
                var pad = Math.max(dx, dy) * 0.5;
                bounds = {
                    x1: minX - pad,
                    y1: minY - pad,
                    x2: maxX + pad,
                    y2: maxY + pad,
                };
            }

            // Deduplica pontos para Delaunay
            var pts = nodes.map(function (d) {
                return [d.x, d.y];
            });
            var unique = [],
                indices = [];
            pts.forEach(function (p, i) {
                var dup = false;
                for (var j = 0; j < unique.length; j++) {
                    if (unique[j][0] === p[0] && unique[j][1] === p[1]) {
                        dup = true;
                        indices.push(j);
                        break;
                    }
                }
                if (!dup) {
                    unique.push(p);
                    indices.push(unique.length - 1);
                }
            });

            if (unique.length >= 3) {
                var delaunay = d3.Delaunay.from(unique);
                var voronoi = delaunay.voronoi([
                    bounds.x1,
                    bounds.y1,
                    bounds.x2,
                    bounds.y2,
                ]);

                voronoiGroup
                    .selectAll("path")
                    .data(nodes)
                    .join("path")
                    .attr("d", function (d, i) {
                        try {
                            return voronoi.renderCell(indices[i]);
                        } catch (e) {
                            return null;
                        }
                    })
                    .attr("fill", function (d) {
                        return (
                            CLUSTER_COLORS[
                                (d.cluster_id || 0) % CLUSTER_COLORS.length
                            ] || "#0ea5e9"
                        );
                    })
                    .attr("fill-opacity", 0.06)
                    .attr("stroke", function (d) {
                        return CLUSTER_COLORS[
                            (d.cluster_id || 0) % CLUSTER_COLORS.length
                        ];
                    })
                    .attr("stroke-opacity", 0.15)
                    .attr("stroke-width", 1);
            }
        }

        renderVoronoi(null);

        // ── Links ──
        g.append("g")
            .selectAll("line")
            .data(data.links || [])
            .join("line")
            .attr("x1", function (d) {
                return (
                    d.source.x ||
                    (typeof d.source === "object" ? d.source.x : 0)
                );
            })
            .attr("y1", function (d) {
                return (
                    d.source.y ||
                    (typeof d.source === "object" ? d.source.y : 0)
                );
            })
            .attr("x2", function (d) {
                return (
                    d.target.x ||
                    (typeof d.target === "object" ? d.target.x : 0)
                );
            })
            .attr("y2", function (d) {
                return (
                    d.target.y ||
                    (typeof d.target === "object" ? d.target.y : 0)
                );
            })
            .attr("stroke", "#27272a")
            .attr("stroke-width", 0.5)
            .attr("stroke-opacity", 0.3);

        // ── Nodes (usam cluster_id do servidor) ──
        var node = g
            .append("g")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .attr("class", "graph-note")
            .attr("transform", function (d) {
                return "translate(" + d.x + "," + d.y + ")";
            })
            .on("click", function (event, d) {
                event.stopPropagation();
                window.location.href =
                    "/editor?file=" + encodeURIComponent(d.id);
            })
            .style("cursor", "pointer");

        node.append("circle")
            .attr("r", 5)
            .attr("fill", function (d) {
                return (
                    CLUSTER_COLORS[
                        (d.cluster_id || 0) % CLUSTER_COLORS.length
                    ] || "#0ea5e9"
                );
            })
            .attr("opacity", 0.9)
            .attr("stroke", "#18181b")
            .attr("stroke-width", 2);

        node.append("text")
            .text(function (d) {
                return (
                    d.title ||
                    d.id
                        .split("/")
                        .pop()
                        .replace(/\.(md|pdf)$/i, "") ||
                    "?"
                );
            })
            .attr("text-anchor", "middle")
            .attr("dy", 15)
            .attr("font-size", "10px")
            .attr("font-weight", "500")
            .attr("fill", "#71717a")
            .attr("font-family", "Inter, system-ui, sans-serif")
            .attr("pointer-events", "none");

        // ── Zoom com Voronoi dinâmico ──
        function getVisibleBounds(transform) {
            var inv = transform.invert;
            var p1 = inv.call(transform, [0, 0]);
            var p2 = inv.call(transform, [width, height]);
            var dx = (p2[0] - p1[0]) * 0.2;
            var dy = (p2[1] - p1[1]) * 0.2;
            return {
                x1: p1[0] - dx,
                y1: p1[1] - dy,
                x2: p2[0] + dx,
                y2: p2[1] + dy,
            };
        }

        var zoom = d3
            .zoom()
            .scaleExtent([0.05, 20])
            .on("zoom", function (event) {
                g.attr("transform", event.transform);
                var vb = getVisibleBounds(event.transform);
                renderVoronoi(vb);
            });

        svg.call(zoom);

        // ── Zoom inicial ──
        var minX = Infinity,
            maxX = -Infinity,
            minY = Infinity,
            maxY = -Infinity;
        nodes.forEach(function (n) {
            if (n.x < minX) minX = n.x;
            if (n.x > maxX) maxX = n.x;
            if (n.y < minY) minY = n.y;
            if (n.y > maxY) maxY = n.y;
        });

        var padding = 80;
        var viewW = width - padding * 2;
        var viewH = height - padding * 2;
        var dx = maxX - minX || 1;
        var dy = maxY - minY || 1;
        var scale = Math.min(viewW / dx, viewH / dy);

        var initTransform = d3.zoomIdentity
            .translate(width / 2, height / 2)
            .scale(scale)
            .translate(-(minX + maxX) / 2, -(minY + maxY) / 2);

        svg.call(zoom.transform, initTransform);

        var vb = getVisibleBounds(initTransform);
        renderVoronoi(vb);
    });
</script>
{{end}}
