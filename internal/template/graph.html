{{template "layout" .}} {{define "graphContent"}}
<style>
    .graph-page {
        margin-left: calc(-50vw + 50%);
        margin-right: calc(-50vw + 50%);
        width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
        box-sizing: border-box;
    }
    .graph-card {
        height: calc(100vh - 140px) !important;
        width: 100%;
    }
</style>
<div class="graph-page">
    <div class="flex items-center justify-between mb-2" style="padding: 0 4px">
        <h1 class="text-sm font-black tracking-tight text-zinc-200">
            Mapa Semântico
        </h1>
        <div class="flex items-center gap-4">
            <span
                id="graph-status"
                class="text-[10px] text-zinc-600 font-medium"
                >—</span
            >
            <span class="text-[10px] text-zinc-700">✦ notas embedadas</span>
        </div>
    </div>

    <div
        class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden premium-card graph-card"
    >
        <div
            id="graph-container"
            style="width: 100%; height: 100%; position: relative"
        ></div>
    </div>

    <p
        class="text-[10px] text-zinc-600 mt-2 text-center tracking-wide uppercase"
    >
        Arraste para mover &middot; Scroll para zoom &middot; Clique na bolinha
        para abrir
    </p>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const statusEl = document.getElementById("graph-status");
        statusEl.textContent = "Carregando...";

        let data;
        try {
            const resp = await fetch("/api/graph/data");
            data = await resp.json();
        } catch (e) {
            statusEl.textContent = "Erro ao carregar";
            return;
        }

        var nodes = data.nodes || [];
        if (nodes.length === 0) {
            statusEl.textContent = "Nenhuma nota embedada";
            return;
        }

        // Se todas as coordenadas forem (0,0), espalha os nos num grid
        var allZero = nodes.every(function (n) {
            return n.x === 0 && n.y === 0;
        });
        if (allZero) {
            var cols = Math.ceil(Math.sqrt(nodes.length));
            nodes.forEach(function (n, i) {
                n.x = (i % cols) * 120 + 60;
                n.y = Math.floor(i / cols) * 120 + 60;
            });
        }

        // Link count for sizing
        var linkCounts = {};
        (data.links || []).forEach(function (l) {
            var s = typeof l.source === "object" ? l.source.id : l.source;
            var t = typeof l.target === "object" ? l.target.id : l.target;
            linkCounts[s] = (linkCounts[s] || 0) + 1;
            linkCounts[t] = (linkCounts[t] || 0) + 1;
        });

        var CLUSTER_COLORS = [
            "#38bdf8",
            "#10b981",
            "#f59e0b",
            "#ef4444",
            "#8b5cf6",
            "#ec4899",
            "#14b8a6",
            "#6366f1",
        ];

        var container = document.getElementById("graph-container");
        var width = container.clientWidth;
        var height = container.clientHeight;

        var svg = d3
            .select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("background", "#09090b");

        var g = svg.append("g");

        // Zoom
        var zoom = d3
            .zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", function (event) {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);

        // Force simulation — alphaDecay acelerado para convergir em ~1-2s
        var simulation = d3
            .forceSimulation(nodes)
            .alphaDecay(0.04)
            .force(
                "link",
                d3
                    .forceLink(data.links || [])
                    .id(function (d) {
                        return d.id;
                    })
                    .distance(100)
                    .strength(0.6),
            )
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide(25));

        // Voronoi layer (rendered before nodes)
        var voronoiGroup = g.append("g").attr("class", "voronoi");

        // Links
        var link = g
            .append("g")
            .selectAll("line")
            .data(data.links || [])
            .join("line")
            .attr("stroke", "#27272a")
            .attr("stroke-width", 0.5)
            .attr("stroke-opacity", 0.4);

        // Nodes
        var node = g
            .append("g")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .call(
                d3
                    .drag()
                    .on("start", function (event, d) {
                        if (!event.active)
                            simulation.alphaTarget(0.3).restart();
                        d.fx = d.x;
                        d.fy = d.y;
                    })
                    .on("drag", function (event, d) {
                        d.fx = event.x;
                        d.fy = event.y;
                    })
                    .on("end", function (event, d) {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null;
                        d.fy = null;
                    }),
            )
            .on("click", function (event, d) {
                event.stopPropagation();
                window.location.href =
                    "/editor?file=" + encodeURIComponent(d.id);
            })
            .style("cursor", "pointer");

        node.append("circle")
            .attr("r", function (d) {
                return 5 + Math.min((linkCounts[d.id] || 0) * 2, 15);
            })
            .attr("fill", function (d) {
                return (
                    CLUSTER_COLORS[d.cluster % CLUSTER_COLORS.length] ||
                    "#0ea5e9"
                );
            })
            .attr("opacity", 0.9)
            .attr("stroke", "#18181b")
            .attr("stroke-width", 2);

        node.append("text")
            .text(function (d) {
                return (
                    d.title ||
                    d.id
                        .split("/")
                        .pop()
                        .replace(/\.(md|pdf)$/i, "") ||
                    "?"
                );
            })
            .attr("text-anchor", "middle")
            .attr("dy", function (d) {
                return 10 + Math.min((linkCounts[d.id] || 0) * 2, 15) + 8;
            })
            .attr("font-size", "9px")
            .attr("font-weight", "500")
            .attr("fill", "#71717a")
            .attr("font-family", "Inter, system-ui, sans-serif")
            .attr("pointer-events", "none");

        // ── Clustering (k-means) ──
        function assignClusters(pts, k) {
            if (pts.length <= k) {
                pts.forEach(function (p, i) {
                    p.cluster = i;
                });
                return;
            }
            var centroids = [];
            var shuffled = pts.slice().sort(function () {
                return Math.random() - 0.5;
            });
            for (var i = 0; i < k; i++)
                centroids.push({ x: shuffled[i].x, y: shuffled[i].y });

            for (var iter = 0; iter < 30; iter++) {
                pts.forEach(function (p) {
                    var best = 0,
                        bestDist = Infinity;
                    centroids.forEach(function (c, j) {
                        var d =
                            (p.x - c.x) * (p.x - c.x) +
                            (p.y - c.y) * (p.y - c.y);
                        if (d < bestDist) {
                            bestDist = d;
                            best = j;
                        }
                    });
                    p.cluster = best;
                });
                var sums = [],
                    counts = [];
                for (var j = 0; j < k; j++) {
                    sums.push({ x: 0, y: 0 });
                    counts.push(0);
                }
                pts.forEach(function (p) {
                    sums[p.cluster].x += p.x;
                    sums[p.cluster].y += p.y;
                    counts[p.cluster]++;
                });
                for (var j = 0; j < k; j++) {
                    if (counts[j] > 0) {
                        centroids[j].x = sums[j].x / counts[j];
                        centroids[j].y = sums[j].y / counts[j];
                    }
                }
            }
        }

        // ── Voronoi progressivo (renderiza a cada 4 ticks) ──
        var voronoiTick = 0;
        var voronoiDone = false;

        function renderVoronoi() {
            if (voronoiDone) return;

            var k = Math.min(8, Math.max(2, Math.floor(nodes.length / 3)));
            assignClusters(nodes, k);

            node.selectAll("circle").attr("fill", function (d) {
                return (
                    CLUSTER_COLORS[d.cluster % CLUSTER_COLORS.length] ||
                    "#0ea5e9"
                );
            });

            var pts = nodes.map(function (d) {
                return [d.x, d.y];
            });
            var unique = [];
            var indices = [];
            pts.forEach(function (p, i) {
                var dup = false;
                for (var j = 0; j < unique.length; j++) {
                    if (unique[j][0] === p[0] && unique[j][1] === p[1]) {
                        dup = true;
                        indices.push(j);
                        break;
                    }
                }
                if (!dup) {
                    unique.push(p);
                    indices.push(unique.length - 1);
                }
            });

            if (unique.length >= 3) {
                var delaunay = d3.Delaunay.from(unique);
                var voronoi = delaunay.voronoi([
                    -50,
                    -50,
                    width + 50,
                    height + 50,
                ]);
                voronoiGroup
                    .selectAll("path")
                    .data(nodes)
                    .join("path")
                    .attr("d", function (d, i) {
                        try {
                            return voronoi.renderCell(indices[i]);
                        } catch (e) {
                            return null;
                        }
                    })
                    .attr("fill", function (d) {
                        return (
                            CLUSTER_COLORS[d.cluster % CLUSTER_COLORS.length] ||
                            "#0ea5e9"
                        );
                    })
                    .attr("fill-opacity", 0.06)
                    .attr("stroke", function (d) {
                        return CLUSTER_COLORS[
                            d.cluster % CLUSTER_COLORS.length
                        ];
                    })
                    .attr("stroke-opacity", 0.15)
                    .attr("stroke-width", 1);
            }
            statusEl.textContent = nodes.length + " notas · " + k + " grupos";
        }

        // Tick — nos + Voronoi a cada 4 quadros
        simulation.on("tick", function () {
            link.attr("x1", function (d) {
                return d.source.x;
            })
                .attr("y1", function (d) {
                    return d.source.y;
                })
                .attr("x2", function (d) {
                    return d.target.x;
                })
                .attr("y2", function (d) {
                    return d.target.y;
                });
            node.attr("transform", function (d) {
                return "translate(" + d.x + "," + d.y + ")";
            });
            voronoiTick++;
            if (voronoiTick % 4 === 0 && simulation.alpha() < 0.3) {
                renderVoronoi();
            }
        });

        // End — Voronoi final + auto-zoom
        simulation.on("end", function () {
            renderVoronoi();
            voronoiDone = true;
            var bounds = g.node().getBBox();
            if (bounds.width > 0 && bounds.height > 0) {
                var scale =
                    0.85 /
                    Math.max(bounds.width / width, bounds.height / height);
                svg.call(
                    zoom.transform,
                    d3.zoomIdentity
                        .translate(
                            width / 2 - scale * (bounds.x + bounds.width / 2),
                            height / 2 - scale * (bounds.y + bounds.height / 2),
                        )
                        .scale(Math.max(0.3, scale)),
                );
            }
        });
    });
</script>
{{end}}
