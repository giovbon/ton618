version: "3.8"

services:
  ton618-pkm:
    image: giovbon/ton618:latest
    container_name: ton618-pkm
    restart: unless-stopped
    ports:
      - "6180:6180"
    environment:
      - PORT=6180
      - POLL_INTERVAL_SEC=30
      - AUTH_USER=admin
      - AUTH_PASS=ton618_secret # RECOMENDADO: Alterar para uma senha forte
      - BLEVE_INDEX_DIR=/app/data/ton618.bleve
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=nomic-embed-text
      - SEMANTIC_ENABLE=true
    volumes:
      - ./docs:/docs
      - ./state:/app/state
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
