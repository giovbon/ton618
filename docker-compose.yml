# docker-compose.yml — build do core para Docker Hub
services:
  ton618:
    build:
      context: ./core
      dockerfile: Dockerfile
    ports:
      - "6180:6180"
    volumes:
      - ./core/data:/data
      - ./core/docs:/docs
      - ./core/documents:/documents
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
