version: "3.8"

services:
  ton618-pkm:
    build: .
    container_name: ton618-pkm
    restart: unless-stopped
    ports:
      - "6180:6180"
    environment:
      - PORT=6180
      - POLL_INTERVAL_SEC=30
      - AUTH_USER=admin
      - AUTH_PASS=ton618_secret
      - BLEVE_INDEX_DIR=/app/data/ton618.bleve
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=nomic-embed-text
      # Modelos alternativos (descomente um e ajuste EMBEDDING_DIMENSION nas Settings):
      # - OLLAMA_MODEL=multilingual-e5          # 1024d, melhor para PT-BR
      # - OLLAMA_MODEL=bge-m3                   # 1024d, multilíngue pesado
      # - OLLAMA_MODEL=mxbai-embed-large        # 1024d, foco inglês
    volumes:
      - ./docs:/docs
      - ./state:/app/state
      - ./data:/app/data
    depends_on:
      - ollama

  # Modelos persistem em ./ollama_data mesmo apos docker compose down.
  # Para limpar tudo: docker compose down -v
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
