name: 🐳 Deploy Docker Multi-Arch

on:
  push:
    tags:
      - "v*"
    branches:
      - main

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem Docker"
        required: false
        default: "latest"
      mode:
        description: "Modo de build: 1 = ARM64, 2 = Multi-Arch"
        required: false
        default: "2"

env:
  IMAGE_NAME: giovbon/ton618_core

jobs:
  deploy:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Definir tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Definir plataformas
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "1" ]; then
            echo "platforms=linux/arm64" >> $GITHUB_OUTPUT
            echo "mode=Apenas ARM64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "mode=Multi-Arch (AMD64 + ARM64)" >> $GITHUB_OUTPUT
          fi

      - name: 🔨 Build e Push
        uses: docker/build-push-action@v6
        with:
          context: ./core
          file: ./core/Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: ✅ Summary
        run: |
          echo "## 🐳 Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagem** | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Plataformas** | ${{ steps.platforms.outputs.platforms }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Modo** | ${{ steps.platforms.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notificar ntfy
        if: success()
        env:
          NTFY_USER: ${{ secrets.NTFY_USER }}
          NTFY_PASS: ${{ secrets.NTFY_PASS }}
        run: |
          sleep 10
          # Gera o token Basic Auth em Base64 de forma segura
          AUTH_TOKEN=$(echo -n "$NTFY_USER:$NTFY_PASS" | base64)
          
          curl -s \
            -H "Authorization: Basic $AUTH_TOKEN" \
            -H "Title: Deploy Concluído" \
            -H "Priority: default" \
            -d "ton618" \
            "https://ntfy.giobon.uk/armbian"
