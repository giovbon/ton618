name: 🖥️ Build Desktop (Wails)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: 📦 Dependencias de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            build-essential pkg-config libappindicator3-dev

      - name: 🔧 Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 🔨 Build core-server
        run: |
          cd core && go build -o core-server ./cmd/server
          cp core-server ../desktop/

      - name: 🔨 Build desktop
        run: |
          cd desktop && wails build -platform linux/amd64

      - name: 📦 Criar pacote Linux
        run: |
          mkdir -p dist/ton618-linux-amd64
          cp desktop/build/bin/TON-618 dist/ton618-linux-amd64/
          cp desktop/core-server dist/ton618-linux-amd64/
          cd dist && tar czf ton618-desktop-linux-amd64.tar.gz ton618-linux-amd64/

      - uses: actions/upload-artifact@v4
        with:
          name: ton618-desktop-linux-amd64
          path: dist/ton618-desktop-linux-amd64.tar.gz

  build-windows:
    name: Windows (ZIP)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: 🔧 Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 🔨 Build core-server
        run: |
          cd core
          go build -o core-server.exe ./cmd/server
          copy core-server.exe ..\desktop\

      - name: 🔨 Build desktop
        run: |
          cd desktop
          wails build -platform windows/amd64

      - name: 📦 Criar ZIP
        run: |
          mkdir dist -Force
          Copy-Item desktop\build\bin\TON-618.exe dist\
          Copy-Item desktop\core-server.exe dist\
          Compress-Archive -Path dist\* -DestinationPath dist\ton618-desktop-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ton618-desktop-windows-amd64
          path: dist/ton618-desktop-windows-amd64.zip
