name: 🖥️ Build Desktop (Wails)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

env:
  GO_VERSION: "1.26"

jobs:
  build-windows:
    name: Windows (Instalador)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true

      - name: 🔧 Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 🔧 Install templ
        shell: bash
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: 🔧 Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: 🔨 Build core-server
        shell: bash
        run: |
          cd core
          templ generate
          go build -o core-server.exe ./cmd/server
          cp core-server.exe ../desktop/

      - name: 🔨 Build desktop + instalador
        shell: bash
        run: |
          cd desktop
          wails build -platform windows/amd64 -nsis

      - name: 📦 Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: TON-618-Setup.exe
          path: desktop/build/bin/*.exe
