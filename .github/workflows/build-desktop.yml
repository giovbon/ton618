name: 🖥️ Build Desktop (Wails)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (ZIP)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: 🔧 Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: � Install templ
        shell: bash
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: 🔨 Build core-server
        shell: bash
        run: |
          cd core
          templ generate
          go build -o core-server.exe ./cmd/server
          cp core-server.exe ../desktop/

      - name: 🔨 Build desktop
        run: |
          cd desktop
          wails build -platform windows/amd64

      - name: 📦 Criar ZIP
        run: |
          mkdir dist -Force
          Copy-Item desktop\build\bin\TON-618.exe dist\
          Copy-Item desktop\core-server.exe dist\
          Compress-Archive -Path dist\* -DestinationPath dist\ton618-desktop-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ton618-desktop-windows-amd64
          path: dist/ton618-desktop-windows-amd64.zip
