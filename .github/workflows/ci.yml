name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

      - name: Build
        run: go build ./...
        working-directory: ./etl

      - name: Vet
        run: go vet ./...
        working-directory: ./etl

      - name: Test
        run: go test ./... -count=1
        working-directory: ./etl

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Frontend Build
        run: |
          npm ci
          npm run build
        working-directory: ./web

      - name: Frontend Lint
        run: npx biome check src/
        working-directory: ./web
