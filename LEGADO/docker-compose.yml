version: "3.8"

services:
  ton618-pkm:
    build: .
    container_name: ton618-pkm
    restart: unless-stopped
    ports:
      - "6180:6180"
    environment:
      - PORT=6180
      - POLL_INTERVAL_SEC=30
      - AUTH_USER=admin
      - AUTH_PASS=ton618_secret
      - BLEVE_INDEX_DIR=/app/data/ton618.bleve
      # Embedding: configure em Settings > APIs > Embedding API
      # Padrão: Ollama (http://localhost:11434, modelo nomic-embed-text)
      # Alternativas: set EMBEDDING_PROVIDER=gemini + EMBEDDING_API_KEY no ambiente
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=nomic-embed-text
    volumes:
      - ./docs:/docs
      - ./state:/app/state
      - ./data:/app/data
